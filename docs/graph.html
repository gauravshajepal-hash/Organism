<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chimera Lab Map</title>
    <meta
      name="description"
      content="A simple read-only map of Chimera Lab goals, runs, outputs, discoveries, and outside research."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="public-shell graph-shell">
      <header class="public-hero compact-hero">
        <div class="hero-copy">
          <p class="eyebrow">Chimera Lab</p>
          <h1>Simple map</h1>
          <p class="lede">
            This is a read-only map of the project. Click a node to see what it is and what it connects to.
          </p>
        </div>
        <nav class="nav-links">
          <a href="./index.html">Home</a>
          <a href="./papers/chimera-lab-research-synthesis.html">Paper</a>
          <a href="https://github.com/gauravshajepal-hash/Organism" target="_blank" rel="noreferrer">GitHub</a>
        </nav>
      </header>

      <section class="graph-layout">
        <article class="public-card wide">
          <div class="graph-header">
            <div>
              <p class="card-kicker">Map</p>
              <h2>Project graph</h2>
            </div>
            <div class="graph-legend" id="graphLegend"></div>
          </div>
          <svg id="graphCanvas" class="graph-canvas" viewBox="0 0 1400 980" preserveAspectRatio="xMidYMid meet"></svg>
        </article>

        <aside class="public-card detail-card">
          <p class="card-kicker">Selected item</p>
          <h2>Details</h2>
          <div id="graphDetail" class="public-list">
            <div class="public-item">
              <strong>No node selected</strong>
              <p>Click any dot or box in the map.</p>
            </div>
          </div>
        </aside>
      </section>
    </main>
    <script src="./graph.js" defer></script>
  </body>
</html>
